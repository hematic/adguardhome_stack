services:
  adguardhome:
    image: adguard/adguardhome:latest
    container_name: adguardhome
    restart: unless-stopped
    ports:
      - 53:53/tcp
      - 53:53/udp
      - 3000:3000/tcp
      - 8080:80/tcp
    volumes:
      - ${ROOT_PATH}/adguardhome/work:/opt/adguardhome/work
      - ${ROOT_PATH}/adguardhome/conf:/opt/adguardhome/conf
